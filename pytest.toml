[pytest]
minversion = "9.0"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "-ra",
    "--strict-config",
    "--strict-markers",
    "--import-mode=importlib",
    "--durations=10",
    "--cov=context8",
    "--cov-branch",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=xml",
    "--no-cov-on-fail",
    "--cov-fail-under=100",
    "--timeout=20"
]
xfail_strict = true
markers = [
    "slow: long-running tests excluded by default",
    "unit: fast, isolated tests that do not require external services",
    "contract: happy-path schema contract tests for Pydantic models",
    "validation: negative-path validation tests for Pydantic models"
]
filterwarnings = ["error"]
